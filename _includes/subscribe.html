<div class="subscribe-box">
  <h3 style="margin-bottom: 0.5rem; font-family: var(--font-display);">E-posta Bültenine Abone Olun</h3>
  <p style="color: var(--muted-color); font-size: 0.95rem; font-family: var(--font-sans); margin-bottom: 1.5rem;">Yeni paylaşımlardan ve notlardan anında haberdar olmak için bültene katılın.</p>
  <form action="https://yavuzyildirim.substack.com/api/v1/free_signup" method="post" class="subscribe-form" target="_blank">
    <input type="email" name="email" class="subscribe-input" placeholder="E-posta adresiniz..." required />
    <input type="hidden" name="current_referring_page" value="{{ page.url | absolute_url }}" />
    <input type="hidden" name="source" value="embed" />
    <button type="submit" class="subscribe-button">Abone Ol</button>
  </form>
</div>
